<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment received — SignalCheck</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
<style>
  body{font-family:'DM Sans',system-ui,sans-serif;background:#f3f0e7;color:#0d1b14;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0;padding:24px}
  .card{max-width:480px;text-align:center;background:#fbfaf5;border:1px solid rgba(13,27,20,.14);border-radius:18px;padding:44px 36px}
  .pulse{width:14px;height:14px;border-radius:50%;background:#15ff6e;margin:0 auto 22px;box-shadow:0 0 0 6px rgba(21,255,110,.18)}
  h1{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin-bottom:12px}
  p{color:#5b6660;font-size:15px;margin-bottom:10px;line-height:1.5}
  a{display:inline-block;margin-top:20px;background:#0d1b14;color:#f3f0e7;text-decoration:none;font-weight:700;padding:14px 28px;border-radius:12px}
</style>
</head>
<body>
  <div class="card">
    <div class="pulse"></div>
    <h1>You're in. Audit on the way.</h1>
    <p>Payment received. Your full tracking report is being prepared and will land in your inbox within 24 hours.</p>
    <p>Questions or want to walk through the fixes live? Just reply to the receipt email.</p>
    <a href="/">Run another scan</a>
  </div>
</body>
</html>
